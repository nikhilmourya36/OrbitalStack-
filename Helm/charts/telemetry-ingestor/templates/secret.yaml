{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-telemetry-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: my-secret-store
    kind: SecretStore
  target:
    name: telemetry-secret
  data:
  - secretKey: DB_PASSWORD
    remoteRef:
      key: telemetry/db-password
{{- end }}