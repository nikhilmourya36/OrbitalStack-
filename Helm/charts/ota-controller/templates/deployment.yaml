apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}

  strategy:                
    type: Recreate

  selector:
    matchLabels:
      app: ota-controller

  template:
    metadata:
      labels:
        app: ota-controller

    spec:
      containers:
      - name: ota-controller
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}

        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 10"]

        resources:
          {{- toYaml .Values.resources | nindent 10 }}

        readinessProbe:
          httpGet:
            path: /
            port: 7070
          initialDelaySeconds: 15
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /
            port: 7070
          initialDelaySeconds: 30
          periodSeconds: 20